<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Motrip — 앨범에 여행 사진을 업로드하고 확인하세요." />
  <title>여행 앨범 — Motrip</title>

  <!-- Bootstrap 5 최신 CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- 일정 페이지 전용 스타일 (공통 테마) -->
  <link rel="stylesheet" href="./css/schedule.css" />
  <!-- 앨범 페이지 전용 스타일 -->
  <link rel="stylesheet" href="./imageupload/css/imageupload.css" />

  <!-- Supabase JS SDK v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- ══ 상단 내비게이션 바 ══ -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="./index.html">🗺 Motrip</a>
      <div class="d-flex align-items-center gap-3 ms-auto flex-wrap">
        <span id="user-status" class="text-white small"></span>
        <button id="logout-btn" class="btn btn-outline-light btn-sm d-none">로그아웃</button>
        <a href="./login.html" class="btn btn-light btn-sm">로그인 / 회원가입</a>
        <a href="./schedule.html" class="btn btn-light btn-sm">일정 관리</a>
      </div>
    </div>
  </nav>

  <!-- ══ 메인 콘텐츠 ══ -->
  <main class="container py-4">
    <h1 class="mb-4">📸 여행 앨범</h1>

    <div class="row g-4">
      <!-- 왼쪽: 파일 업로드 폼 -->
      <div class="col-12 col-md-4">
        <div class="card shadow-sm mb-4">
          <div class="card-header bg-primary text-white">
            <h2 class="h5 mb-0">사진 업로드</h2>
          </div>
          <div class="card-body">
            <form id="upload-form" novalidate>
              <div class="mb-3">
                <label for="image-file" class="form-label fw-semibold">이미지 파일 선택</label>
                <input id="image-file" type="file" name="file" class="form-control" accept="image/*" required />
              </div>
              <button type="submit" class="btn btn-primary w-100">업로드</button>
            </form>
          </div>
        </div>
      </div>

      <!-- 오른쪽: 이미지 목록 -->
      <div class="col-12 col-md-8">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="h5 mb-0">🖼 앨범 목록</h2>
        </div>
        <div id="image-list" class="row g-3">
          <p class="text-center text-muted py-4">이미지를 불러오는 중...</p>
        </div>
      </div>
    </div>
  </main>

  <!-- ══ 푸터 ══ -->
  <footer class="text-center text-muted small py-4 border-top mt-4">
    © 2025 Motrip — AIBE7 Project1 E1I3 팀
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/msg.js"></script>
  <script src="./js/supabase-client.js"></script>
  <!-- 앨범 모듈 로직 -->
  <script src="./imageupload/js/imageupload.js"></script>
</body>
</html>
