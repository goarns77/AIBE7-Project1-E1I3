<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 - 모여행</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <!-- Plus Jakarta Sans -->
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  >
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  >
  <link href="/design/css/signup.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="../../favicon/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="../../favicon/favicon-96x96.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../../favicon/apple-touch-icon.png">
  <link rel="manifest" href="../../favicon/site.webmanifest">
</head>
<body>

  <div class="signup-card">
    <!-- 홈으로 돌아가기 -->
    <p style="text-align:center;margin-bottom:1.25rem;">
      <a href="./index.html" style="color:var(--primary);font-size:0.8125rem;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:0.25rem;">← 홈으로 돌아가기</a>
    </p>
    <!-- 브랜드 영역 -->
    <div class="brand-icon">
      <i class="bi bi-compass-fill"></i>
    </div>
    <h1 class="brand-title">모여행 가입하기</h1>
    <p class="brand-sub">함께 떠날 여행 친구를 기다리고 있어요</p>

    <!-- 회원가입 폼 -->
    <form id="signupForm" novalidate>
      <!-- 이름 -->
      <div class="mb-3">
        <label for="name" class="form-label">이름</label>
        <input
          type="text"
          class="form-control"
          id="name"
          placeholder="홍길동"
          required
        >
      </div>

      <!-- 이메일 -->
      <div class="mb-3">
        <label for="email" class="form-label">이메일</label>
        <input
          type="email"
          class="form-control"
          id="email"
          placeholder="hello@example.com"
          required
        >
      </div>

      <!-- 비밀번호 -->
      <div class="mb-3">
        <label for="password" class="form-label">비밀번호</label>
        <input
          type="password"
          class="form-control"
          id="password"
          placeholder="8자 이상 입력해주세요"
          minlength="8"
          required
        >
        <div class="form-text">영문, 숫자, 특수문자 포함 8자 이상</div>
      </div>

      <!-- 비밀번호 확인 -->
      <div class="mb-4">
        <label for="passwordConfirm" class="form-label">비밀번호 확인</label>
        <input
          type="password"
          class="form-control"
          id="passwordConfirm"
          placeholder="비밀번호를 다시 입력해주세요"
          required
        >
        <div class="password-match" id="passwordMatchMsg"></div>
      </div>

      <!-- 회원가입 버튼 -->
      <button type="submit" class="btn btn-signup">
        가입하기
      </button>
    </form>

    <!-- 약관 안내 -->
    <p class="terms-text">
      가입 시
      <a href="#">이용약관</a>과
      <a href="#">개인정보처리방침</a>에 동의하게 됩니다
    </p>

    <!-- 로그인 링크 -->
    <p class="text-center mt-3 mb-0" style="font-size:0.875rem;color:var(--on-surface-variant);">
      이미 계정이 있으신가요?
      <a href="/design/html/login.html" class="login-link">로그인</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/design/js/lib/supabase.js"></script>
  <script src="/design/js/msg.js"></script>
  <script src="/design/js/signup.js"></script>

</body>
</html>
