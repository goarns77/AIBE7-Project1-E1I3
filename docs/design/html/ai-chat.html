<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 여행 추천 - 모여행</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <!-- Plus Jakarta Sans -->
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  >
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  >
  <link href="/design/css/ai-chat.css" rel="stylesheet">
</head>
<body>

  <div class="chat-container">
    <header class="chat-header">
      <a href="/index.html" class="chat-header-btn" title="홈으로">
        <i class="bi bi-house-fill"></i>
      </a>
      <div class="chat-header-icon">
        <i class="bi bi-stars"></i>
      </div>
      <div>
        <h1 class="chat-header-title">AI 여행 추천</h1>
        <p class="chat-header-sub">당신을 위한 맞춤 일정을 찾아드려요</p>
      </div>
      <div class="chat-header-actions">
        <button class="chat-header-btn" id="newChatBtn" title="새 대화 시작">
          <i class="bi bi-plus-lg"></i>
        </button>
        <button class="chat-header-btn" id="logoutBtn" title="로그아웃">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </header>

    <div class="suggestion-chips">
      <span class="chip" data-query="국내 여행 추천">🏖 국내 여행</span>
      <span class="chip" data-query="해외 여행 추천">✈ 해외 여행</span>
      <span class="chip" data-query="힐링 여행지 추천">🧘 힐링</span>
      <span class="chip" data-query="맛집 여행 추천">🍜 맛집 여행</span>
      <span class="chip" data-query="액티비티 여행 추천">🏄 액티비티</span>
      <span class="chip" data-query="가족 여행 추천">👨‍👩‍👧‍👦 가족 여행</span>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="chat-input-area">
      <div class="chat-input-wrapper">
        <input
          type="text"
          class="chat-input"
          id="chatInput"
          placeholder="여행 정보를 알려주세요..."
          autofocus
        >
        <button class="btn-send" id="sendBtn">
          <i class="bi bi-send-fill"></i>
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/design/js/lib/supabase.js"></script>
  <script src="/design/js/msg.js"></script>
  <script src="/design/js/ai-chat.js"></script>

</body>
</html>
