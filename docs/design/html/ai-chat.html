<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 여행 추천 - 모여행</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <!-- Plus Jakarta Sans -->
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  >
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  >
  <link href="../css/ai-chat.css" rel="stylesheet">
  <!-- 공통 테마 -->
  <link rel="stylesheet" href="../css/room.css">
</head>
<body>

  <!-- 글래스 헤더 -->
  <nav class="navbar navbar-expand-lg glass-panel sticky-top shadow-sm">
    <div class="container" style="max-width: 1280px;">
      <a class="navbar-brand" href="./index.html">
        <img src="../images/motrip-logo.png" alt="Motrip" style="height:36px;width:auto;">
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#topnav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="topnav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3">
          <li class="nav-item"><a class="nav-link" href="#">패키지</a></li>
          <li class="nav-item"><a class="nav-link" href="./room.html" id="navPlanner">플래너</a></li>
          <li class="nav-item"><a class="nav-link active fw-bold text-primary" href="">AI 추천</a></li>
          <li class="nav-item"><a class="nav-link" href="#">마이페이지</a></li>
          <li class="nav-item ms-lg-2">
            <a class="btn btn-primary btn-pill px-4" href="./room-create.html">여행방 만들기</a>
          </li>
          <li class="nav-item ms-lg-2">
            <button class="btn btn-outline-secondary btn-pill px-3" id="newChatBtn">
              <i class="bi bi-plus-lg"></i> 새 채팅
            </button>
          </li>
          <li class="nav-item ms-lg-2">
            <button class="btn btn-outline-danger btn-pill px-3" onclick="logout()">로그아웃</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="chat-container">

    <div class="chat-messages" id="chatMessages"></div>

    <div class="chat-input-area">
      <div class="chat-input-wrapper">
        <input
          type="text"
          class="chat-input"
          id="chatInput"
          placeholder="여행 정보를 알려주세요..."
          autofocus
        >
        <button class="btn-send" id="sendBtn">
          <i class="bi bi-send-fill"></i>
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.6/marked.min.js"></script>
  <script src="../js/lib/supabase.js"></script>
  <script src="../js/msg.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script>
    // 플래너 링크에 마지막 방문 방 ID 추가
    (function () {
      const lastId = localStorage.getItem('motrip:lastRoomId');
      if (lastId) {
        const el = document.getElementById('navPlanner');
        if (el) el.href = './room.html?roomId=' + lastId;
      }
    })();
  </script>
  <script src="../js/ai-chat.js"></script>

  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toast" class="toast align-items-center text-bg-dark border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

</body>
</html>
