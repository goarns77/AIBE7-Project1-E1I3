<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지 | Motrip</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/room.css">
</head>
<body class="bg-light">

  <!-- 내비게이션 -->
  <nav class="navbar navbar-expand-lg glass-panel sticky-top shadow-sm">
    <div class="container" style="max-width: 1280px;">
      <a class="navbar-brand" href="./index.html">
        <img src="../images/motrip-logo.png" alt="Motrip" style="height:36px;width:auto;">
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#topnav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="topnav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3">
          <li class="nav-item"><a class="nav-link" href="./room.html">플래너</a></li>
          <li class="nav-item"><a class="nav-link" href="./ai-chat.html">AI 추천</a></li>
          <li class="nav-item"><a class="nav-link active fw-bold text-primary" href="./mypage.html">마이페이지</a></li>
          <li class="nav-item ms-lg-2">
            <a class="btn btn-primary btn-pill px-4" href="./room-create.html">여행방 만들기</a>
          </li>
          <li class="nav-item ms-lg-2">
            <button class="btn btn-outline-danger btn-pill px-3" onclick="logout()">로그아웃</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- 메인 -->
  <main class="container py-5" style="max-width: 1280px;">
    
    <!-- 프로필 카드 -->
    <div class="card border-0 shadow-sm rounded-4 mb-4">
      <div class="card-body p-4">
        <div class="d-flex align-items-center gap-4">
          <div class="rounded-circle bg-primary d-flex align-items-center justify-content-center text-white fw-bold" id="profile-avatar" style="width:72px;height:72px;font-size:1.8rem;">?</div>
          <div class="flex-grow-1">
            <h4 class="mb-1" id="profile-name">로딩 중...</h4>
            <p class="text-secondary mb-2" id="profile-email"></p>
            <span class="badge bg-primary bg-opacity-10 text-primary" id="profile-role">일반 회원</span>
          </div>
          <button class="btn btn-outline-primary rounded-pill" data-bs-toggle="modal" data-bs-target="#editProfileModal">프로필 편집</button>
        </div>
      </div>
    </div>

    <!-- 내 여행 목록 -->
    <h5 class="fw-bold mb-3">내 여행</h5>
    <div class="row g-3" id="my-rooms">
      <div class="col-12 text-center text-secondary py-5">로딩 중...</div>
    </div>

    <!-- 푸터 -->
    <footer class="py-5 mt-5 border-top bg-white rounded-4">
      <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-3" style="max-width: 1280px;">
        <div class="text-center text-md-start">
          <img src="../images/motrip-logo.png" alt="Motrip" style="height:32px;width:auto;">
          <p class="text-secondary small mb-0 mt-2">&copy; 2026 모여행 &middot; 함께 떠나는 여행 계획</p>
        </div>
        <div class="d-flex gap-4 small">
          <a class="link-secondary text-decoration-none" href="#">서비스 소개</a>
          <a class="link-secondary text-decoration-none" href="#">개인정보처리방침</a>
          <a class="link-secondary text-decoration-none" href="#">이용약관</a>
        </div>
      </div>
    </footer>
  </main>

  <!-- 프로필 편집 모달 -->
  <div class="modal fade" id="editProfileModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-0">
          <h5 class="modal-title fw-bold">프로필 편집</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="profile-form">
            <div class="mb-3">
              <label class="form-label small fw-semibold">닉네임</label>
              <input type="text" class="form-control" id="edit-nickname" maxlength="20" required>
            </div>
            <div class="mb-3">
              <label class="form-label small fw-semibold">이메일</label>
              <input type="email" class="form-control" id="edit-email" readonly disabled>
            </div>
            <button type="submit" class="btn btn-primary w-100 rounded-pill" id="profile-save-btn">저장</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- 토스트 -->
  <div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
    <div id="toast" class="toast align-items-center text-bg-primary border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/msg.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/lib/supabase.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/mypage.js"></script>
</body>
</html>
