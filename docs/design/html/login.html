<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 모여행</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <!-- Plus Jakarta Sans -->
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  >
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  >
  <link href="/design/css/login.css" rel="stylesheet">
</head>
<body>

  <div class="login-card">
    <!-- 브랜드 영역 -->
    <div class="brand-icon">
      <i class="bi bi-airplane-engines-fill"></i>
    </div>
    <h1 class="brand-title">모여행</h1>
    <p class="brand-sub">새로운 여행의 시작, 함께 떠나볼까요?</p>

    <!-- 로그인 폼 -->
    <form id="loginForm" novalidate>
      <!-- 이메일 -->
      <div class="mb-3">
        <label for="email" class="form-label">이메일</label>
        <input
          type="email"
          class="form-control"
          id="email"
          placeholder="hello@example.com"
          required
        >
      </div>

      <!-- 비밀번호 -->
      <div class="mb-4">
        <label for="password" class="form-label">비밀번호</label>
        <input
          type="password"
          class="form-control"
          id="password"
          placeholder="••••••••"
          required
        >
      </div>

      <!-- 로그인 버튼 -->
      <button type="submit" class="btn btn-login">
        로그인
      </button>
    </form>

    <!-- 소셜 로그인 구분선 -->
    <div class="divider">간편 로그인</div>

    <div class="d-flex gap-2">
      <button type="button" class="btn-social">
        <i class="bi bi-google me-1"></i> Google
      </button>
      <button type="button" class="btn-social">
        <i class="bi bi-person-badge me-1"></i> 카카오
      </button>
    </div>

    <!-- 회원가입 링크 -->
    <p class="text-center mt-4 mb-0" style="font-size:0.875rem;color:var(--on-surface-variant);">
      아직 계정이 없으신가요?
      <a href="/design/html/signup.html" class="signup-link">회원가입</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/design/js/lib/supabase.js"></script>
  <script src="/design/js/msg.js"></script>
  <script src="/design/js/login.js"></script>

</body>
</html>
