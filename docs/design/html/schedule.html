<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Motrip — 여행 일정을 팀원과 함께 추가·수정·삭제하고 좋아요로 투표하세요." />
  <title>일정 관리 — Motrip</title>

  <!-- Bootstrap 5 최신 CDN -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  />
  <!-- 일정 페이지 전용 스타일 (폰트 포함) -->
  <link rel="stylesheet" href="./css/schedule.css" />

  <!-- Supabase JS SDK v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- ══ 상단 내비게이션 바 ══ -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <!-- 브랜드명 -->
      <a class="navbar-brand" href="./index.html">🗺 Motrip</a>

      <div class="d-flex align-items-center gap-3 ms-auto flex-wrap">
        <!-- 로그인 상태 표시 -->
        <span id="user-status" class="text-white small"></span>
        <!-- 로그아웃 버튼 (로그인 시에만 표시) -->
        <button id="logout-btn" class="btn btn-outline-light btn-sm d-none">로그아웃</button>
        <!-- 로그인 페이지 링크 -->
        <a href="./login.html" class="btn btn-light btn-sm">로그인 / 회원가입</a>
      </div>
    </div>
  </nav>

  <!-- ══ 메인 콘텐츠 ══ -->
  <main class="container py-4">
    <h1 class="mb-4">여행 일정 관리</h1>

    <div class="row g-4">

      <!-- ── 왼쪽: 일정 추가 폼 & 수정 폼 ── -->
      <div class="col-12 col-md-4">

        <!-- 일정 추가 폼 -->
        <div class="card shadow-sm mb-4">
          <div class="card-header bg-primary text-white">
            <h2 class="h5 mb-0">일정 추가</h2>
          </div>
          <div class="card-body">
            <form id="add-schedule-form" novalidate>

              <!-- 일자 입력 -->
              <div class="mb-3">
                <label for="add-date" class="form-label fw-semibold">📅 일자</label>
                <input
                  id="add-date"
                  type="date"
                  name="trip_date"
                  class="form-control"
                  required
                />
              </div>

              <!-- 시간 입력 -->
              <div class="mb-3">
                <label for="add-time" class="form-label fw-semibold">⏰ 시간</label>
                <input
                  id="add-time"
                  type="time"
                  name="trip_time"
                  class="form-control"
                  required
                />
              </div>

              <!-- 내용 입력 -->
              <div class="mb-3">
                <label for="add-content" class="form-label fw-semibold">📝 내용</label>
                <textarea
                  id="add-content"
                  name="content"
                  class="form-control"
                  rows="3"
                  placeholder="일정 내용을 입력하세요"
                  required
                ></textarea>
              </div>

              <button type="submit" class="btn btn-primary w-100">일정 추가</button>
            </form>
          </div>
        </div>

        <!-- 일정 수정 폼 (수정 버튼 클릭 시 표시) -->
        <div id="edit-form-wrapper" class="d-none mb-4">
          <h2 class="h5 mb-3">✏️ 일정 수정</h2>
          <form id="edit-schedule-form" novalidate>

            <!-- 수정 대상 일정 ID (숨김 처리) -->
            <input type="hidden" name="edit-id" />

            <!-- 수정할 일자 -->
            <div class="mb-3">
              <label for="edit-date" class="form-label fw-semibold">📅 일자</label>
              <input
                id="edit-date"
                type="date"
                name="edit-date"
                class="form-control"
                required
              />
            </div>

            <!-- 수정할 시간 -->
            <div class="mb-3">
              <label for="edit-time" class="form-label fw-semibold">⏰ 시간</label>
              <input
                id="edit-time"
                type="time"
                name="edit-time"
                class="form-control"
                required
              />
            </div>

            <!-- 수정할 내용 -->
            <div class="mb-3">
              <label for="edit-content" class="form-label fw-semibold">📝 내용</label>
              <textarea
                id="edit-content"
                name="edit-content"
                class="form-control"
                rows="3"
                required
              ></textarea>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary flex-grow-1">수정 완료</button>
              <button type="button" id="edit-cancel-btn" class="btn btn-outline-secondary">취소</button>
            </div>
          </form>
        </div>

      </div><!-- /col -->

      <!-- ── 오른쪽: 일정 목록 ── -->
      <div class="col-12 col-md-8">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <h2 class="h5 mb-0">📋 일정 목록</h2>
          <!-- 좋아요 안내 배지 -->
          <span class="badge bg-danger-subtle text-danger border border-danger-subtle">
            ♥ 좋아요
          </span>
        </div>

        <!-- 일정 카드들이 JS에 의해 여기에 렌더링됨 -->
        <div id="schedule-list">
          <p class="text-center text-muted py-4">일정을 불러오는 중...</p>
        </div>
      </div><!-- /col -->

    </div><!-- /row -->
  </main>

  <!-- ══ 푸터 ══ -->
  <footer class="text-center text-muted small py-4 border-top mt-4">
    © 2025 Motrip — AIBE7 Project1 E1I3 팀
  </footer>

  <!-- Bootstrap 5 JS (Toast, Collapse 등 사용) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- 메시지 상수 먼저 로드 -->
  <script src="./js/msg.js"></script>
  <!-- Supabase 클라이언트 초기화 (URL/Key 임시 공백 처리 상태) -->
  <script src="./js/supabase-client.js"></script>
  <!-- 일정 CRUD + 좋아요 로직 -->
  <script src="./js/schedule.js"></script>

</body>
</html>
