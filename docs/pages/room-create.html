<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>모여행 - 여행방 만들기</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <!-- Material Symbols 아이콘 -->
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
    rel="stylesheet"
  >
  <!-- 공통 테마 -->
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

  <!-- 글래스 헤더 -->
  <nav class="navbar navbar-expand-lg glass-panel sticky-top shadow-sm">
    <div class="container" style="max-width: 1280px;">
      <a class="navbar-brand brand-logo fs-3" href="../index.html">Motrip</a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#topnav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="topnav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3">
          <li class="nav-item"><a class="nav-link" href="#">패키지</a></li>
          <li class="nav-item"><a class="nav-link active fw-bold text-primary" href="#">플래너</a></li>
          <li class="nav-item"><a class="nav-link" href="#">AI 추천</a></li>
          <li class="nav-item"><a class="nav-link" href="#">마이페이지</a></li>
          <li class="nav-item ms-lg-2">
            <a class="btn btn-primary btn-pill px-4" href="./room-create.html">여행방 만들기</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5" style="max-width: 640px;">

    <!-- 여행방 생성 폼 -->
    <section id="create-section">

      <div class="text-center mb-4">
        <span class="vote-chip mb-3"><span class="material-symbols-outlined">groups</span> 공동 여행 계획</span>
        <h1 class="h2 mb-2">새 여행방 만들기</h1>
        <p class="text-secondary">함께 떠날 친구들과 일정을 모을 공간을 만들어요.</p>
      </div>

      <form id="create-form" class="card rounded-4xl">
        <div class="card-body p-4 p-md-5">

          <div class="mb-3">
            <label class="form-label fw-semibold" for="tripTitle">여행명 <span class="text-danger">*</span></label>
            <input class="form-control input-soft p-3" id="tripTitle" name="tripTitle" placeholder="예) 제주 우정여행" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold" for="destination">목적지</label>
            <input class="form-control input-soft p-3" id="destination" name="destination" placeholder="예) 제주도">
          </div>

          <div class="row g-3 mb-3">
            <div class="col">
              <label class="form-label fw-semibold" for="startDate">출발일</label>
              <input type="date" class="form-control input-soft p-3" id="startDate" name="startDate">
            </div>
            <div class="col">
              <label class="form-label fw-semibold" for="endDate">도착일</label>
              <input type="date" class="form-control input-soft p-3" id="endDate" name="endDate">
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold" for="host">내 닉네임(주최자)</label>
            <input class="form-control input-soft p-3" id="host" name="host" placeholder="예) 지원">
          </div>

          <button type="submit" class="btn btn-primary btn-pill w-100 py-3">
            <span class="material-symbols-outlined">add_circle</span> 여행방 생성
          </button>

        </div>
      </form>

    </section>

    <!-- 생성 결과 및 초대 링크 -->
    <section id="result-section" class="d-none">

      <div class="card rounded-4xl">
        <div class="card-body text-center p-4 p-md-5">

          <div class="display-5 mb-2">🎉</div>
          <h2 class="h4 mb-1"><span id="created-title"></span> 여행방이 만들어졌어요!</h2>
          <p class="text-secondary mb-4">아래 초대 링크를 친구에게 공유하세요.</p>

          <label class="form-label small text-secondary text-start d-block">초대 링크</label>
          <div class="input-group mb-3">
            <input id="invite-link" class="form-control input-soft p-3" readonly>
            <button id="copy-invite" class="btn btn-primary btn-pill px-4 ms-2" type="button">
              <span class="material-symbols-outlined">content_copy</span> 복사
            </button>
          </div>

          <a id="enter-room" class="btn btn-teal btn-pill w-100 py-3" href="#">
            <span class="material-symbols-outlined">login</span> 여행방 입장하기
          </a>

        </div>
      </div>

    </section>

  </main>

  <!-- 푸터 -->
  <footer class="py-5 mt-5 border-top bg-white">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-3" style="max-width: 1280px;">
      <div class="text-center text-md-start">
        <div class="brand-logo fs-4">Motrip</div>
        <p class="text-secondary small mb-0">© 2026 모여행 · 함께 떠나는 여행 계획</p>
      </div>
      <div class="d-flex gap-4 small">
        <a class="link-secondary text-decoration-none" href="#">서비스 소개</a>
        <a class="link-secondary text-decoration-none" href="#">개인정보처리방침</a>
        <a class="link-secondary text-decoration-none" href="#">이용약관</a>
      </div>
    </div>
  </footer>

  <!-- 토스트 알림 -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toast" class="toast align-items-center text-bg-dark border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/msg.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/room-create.js"></script>

</body>
</html>
